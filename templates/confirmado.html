<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva Confirmada</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1a2f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: #1e2b3c;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            color: #2ecc71;
            margin-bottom: 20px;
        }

        .btn {
            display: block;
            margin: 15px 0;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .volver {
            background: #3b82f6;
            color: white;
        }

        .whatsapp {
            background: #25D366;
            color: white;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>✅ Reserva confirmada</h1>

    <a href="/" class="btn volver">← Volver</a>

    <a href="https://wa.me/50689872394?text=Hola%20quiero%20confirmar%20mi%20reserva"
       class="btn whatsapp">
       📲 Confirmar por WhatsApp
    </a>
</div>

</body>
</html>
