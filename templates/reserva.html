<!DOCTYPE html>
<html>
<head>
    <title>Reserva</title>
</head>
<body style="text-align:center; font-family:Arial;">

    <h1>Reservar Cabaña</h1>

    <form method="POST">
        <input type="text" name="nombre" placeholder="Tu nombre" required><br><br>
        <input type="date" name="fecha" required><br><br>

        <button type="submit">Reservar</button>
    </form>

    <h3 style="color:red;">{{ mensaje }}</h3>

    {% if link_whatsapp %}
        <a href="{{ link_whatsapp }}" target="_blank">
            <button>Confirmar por WhatsApp</button>
        </a>
    {% endif %}

    <h2>Fechas ocupadas:</h2>
    <ul>
        {% for fecha in fechas %}
            <li>{{ fecha }}</li>
        {% endfor %}
    </ul>

</body>
</html>
